<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Room — Uniform Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-logo {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #fff;
    text-transform: uppercase;
    font-family: Georgia, 'Times New Roman', serif;
  }

  /* ── GRID ── */
  .grid {
    padding: 0 4px 4px 4px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  .photo {
    position: relative;
    height: 220px;
    overflow: hidden;
    cursor: pointer;
  }

  .photo-inner {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease, filter 0.3s ease;
  }

  .photo:hover .photo-inner {
    filter: brightness(1.08);
  }

  /* Different grey tones to simulate varied photos */
  .t1 { background: #222; }
  .t2 { background: #1a1a1a; }
  .t3 { background: #2e2e2e; }
  .t4 { background: #242424; }
  .t5 { background: #191919; }
  .t6 { background: #303030; }
  .t7 { background: #1c1c1c; }
  .t8 { background: #272727; }
  .t9 { background: #1f1f1f; }
  .t10 { background: #2b2b2b; }
  .t11 { background: #212121; }
  .t12 { background: #252525; }

  /* Tiny label strip below */
  .meta {
    padding: 28px 24px 20px;
    border-top: 1px solid #1a1a1a;
    margin-top: 12px;
    display: flex;
    gap: 32px;
  }
  .meta-item { display: flex; flex-direction: column; gap: 4px; }
  .meta-key {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #444;
    font-weight: 600;
  }
  .meta-val {
    font-size: 12px;
    color: #888;
  }
</style>
</head>
<body>

<div class="site-header">
  <span class="site-logo">Faiz</span>
</div>

<div class="grid">
  <div class="photo t1"></div>
  <div class="photo t3"></div>
  <div class="photo t2"></div>
  <div class="photo t5"></div>
  <div class="photo t4"></div>
  <div class="photo t6"></div>
  <div class="photo t7"></div>
  <div class="photo t9"></div>
  <div class="photo t8"></div>
  <div class="photo t11"></div>
  <div class="photo t10"></div>
  <div class="photo t12"></div>
</div>

<div class="meta">
  <div class="meta-item">
    <span class="meta-key">Background</span>
    <span class="meta-val">#0A0A0A</span>
  </div>
  <div class="meta-item">
    <span class="meta-key">Grid</span>
    <span class="meta-val">3 columns · fixed height · 3px gap</span>
  </div>
  <div class="meta-item">
    <span class="meta-key">Hover</span>
    <span class="meta-val">Subtle brightness lift</span>
  </div>
  <div class="meta-item">
    <span class="meta-key">Click</span>
    <span class="meta-val">Full-screen lightbox</span>
  </div>
</div>

</body>
</html>
